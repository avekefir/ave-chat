<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Дружеский чат</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-container">
    <h2>Вход в чат</h2>
    <input type="text" id="nickname-input" placeholder="Ваш ник" autofocus>
    <button id="join-btn">Присоединиться</button>
  </div>

  <div id="chat-container" style="display: none;">
    <!-- Кнопка меню для мобильных -->
    <button id="menu-toggle">☰</button>
    <div id="sidebar-overlay"></div>
    
    <div id="sidebar">
      <h3>Участники (<span id="user-count">0</span>)</h3>
      <ul id="users-list"></ul>
    </div>
    
    <div id="main">
      <div id="messages"></div>
      
      <div id="input-area">
        <input type="text" id="message-input" placeholder="Введите сообщение..." disabled>
        <div class="input-buttons">
          <button id="send-btn" disabled>Отправить</button>
          <button id="voice-btn" disabled>🎤 Записать</button>
        </div>
        <span id="recording-status" style="display: none;">🔴 Запись...</span>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
